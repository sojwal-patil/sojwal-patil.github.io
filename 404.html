<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <link rel="stylesheet" href="static/main.css">
    <script src="https://kit.fontawesome.com/96d552640e.js" crossorigin="anonymous"></script>


    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0d0d0d;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
            overflow:hidden;
        }

        .container{
            text-align:center;
            padding:30px;
        }

        h1{
            font-size:9rem;
            color:rgb(208, 97, 0);
            text-shadow:0 0 20px rgba(255,152,0,.15);
            margin-bottom:10px;
        }

        h2{
            font-size:2rem;
            margin-bottom:20px;
        }

        p{
            color:#aaa;
            max-width:500px;
            margin:auto;
            line-height:1.8;
            margin-bottom:40px;
        }

        a{
            display:inline-block;
            text-decoration:none;
            color:#111;
            background-color:rgb(208, 97, 0);
            padding:15px 35px;
            border-radius:10px;
            font-weight:700;
            transition:.3s;
        }

        a:hover{
            transform:translateY(-4px);
            box-shadow:0 10px 25px rgba(255,152,0,.15);
        }

        .code{
            color:#666;
            margin-top:60px;
            font-family:monospace;
            font-size:15px;
        }

        @media(max-width:600px){

            h1{
                font-size:6rem;
            }

            h2{
                font-size:1.6rem;
            }

        }
    </style>
</head>
<body>

    <div class="container">

        <h1>404</h1>

        <h2>Oops! Lost in the source code.</h2>

        <p>
            The page you're looking for doesn't exist, was moved,
            or never made it to production.
        </p>

        <a href="/"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

        <div class="code">
            console.error("Page Not Found");
        </div>

    </div>

</body>
</html>
